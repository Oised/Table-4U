<!DOCTYPE html>
<html lang="pt"> 
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 4U</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/global.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>
<body>
    
<div class="main">
        
        <div class="welcome">
            <p class="text">Bem-vindo ao</p>
            <h1 class="nome-restaurante">Table4U</h1>
        </div>
        
        <div class="actions-container">
 <a href="pages/queue.html" onclick="irPara(event, 'pages/queue.html', 'Para entrar na fila')" class="action-btn btn-primary" style="text-decoration: none; display: flex; justify-content: center; align-items: center;">
    Entrar na Fila
</a>
<a href="pages/booking.html" onclick="irPara(event, 'pages/booking.html', 'Para fazer uma reserva')" class="action-btn btn-primary" style="text-decoration: none; display: flex; justify-content: center; align-items: center;">
    Fazer Reserva
</a>

    <div style="height: 1px; background-color: rgba(255,255,255,0.1); margin: 5px 0;"></div>

    <a href="pages/menu.html" class="action-btn btn-secondary" style="text-decoration: none; display: flex; justify-content: center; align-items: center;">
        Ver Menu
    </a>
    <a href="components/cardapio.pdf" download="cardapio.pdf" class="action-btn btn-secondary" style="text-decoration: none; display: flex; justify-content: center; align-items: center;">
        Baixar Menu
    </a>
</div>
    </div>



<!-- BOTÃO PERFIL -->
<button class="perfil-btn" onclick="togglePerfil()">
    <div class="perfil-iniciais"></div>
</button>

<!-- POPUP PERFIL -->
<div id="popup-perfil" class="popup-perfil">
    <div class="perfil-topo">
        <div class="perfil-avatar-grande"></div>
        <div>
            <p class="perfil-nome"></p>
            <p class="perfil-email"></p>
        </div>
    </div>
    <a href="pages/login.html" class="perfil-menu-item perfil-deslogado">Fazer Login</a>
    <a href="pages/login.html?cadastro=true" class="perfil-menu-item perfil-deslogado">Criar Conta</a>
    <a href="#" class="perfil-menu-item perfil-logado" onclick="irParaMinhasReservas(event)">Minhas Reservas</a>
    <a href="#" class="perfil-menu-item perfil-logado" onclick="irParaEditarPerfil(event)">Editar Perfil</a>
    <a href="#" class="perfil-menu-item sair perfil-logado" onclick="sair()">Sair</a>
</div>












    <footer>
        <p class="footer-info">Endereço e Contatos</p>
        <p class="powerby">Powered by Table4U</p>
    </footer>


<script src="scripts/index.js"></script>
<script src="scripts/profile.js"></script>



</body>
</html>
